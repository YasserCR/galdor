# golangci-lint v1.x configuration (action pins v1.62.0 in .github/workflows/ci.yml).
# Bump in lockstep if the action version changes.

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - contextcheck
    - errorlint
    - nilerr
    - nolintlint
    - prealloc
    - copyloopvar
    - gofmt
    - goimports

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
  gosec:
    excludes:
      - G104

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - unparam
