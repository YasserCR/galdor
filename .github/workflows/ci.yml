name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  # Linted/tested modules. Whitespace-separated module roots, relative to repo root.
  GALDOR_MODULES: ". providers/anthropic providers/bedrock providers/google providers/openai memory/sqlite memory/pgvector memory/qdrant"

jobs:
  test:
    name: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify go.mod is tidy (each module)
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        run: |
          for mod in $GALDOR_MODULES; do
            echo "::group::tidy $mod"
            (cd "$mod" && go mod tidy)
            if [ -n "$(git status --porcelain -- "$mod/go.mod" "$mod/go.sum")" ]; then
              echo "::error::$mod go.mod or go.sum is out of date; run 'go mod tidy'"
              git --no-pager diff -- "$mod/go.mod" "$mod/go.sum" || true
              exit 1
            fi
            echo "::endgroup::"
          done

      - name: Build (workspace)
        run: go build ./...

      - name: Vet (workspace)
        run: go vet ./...

      - name: Test with race detector (workspace)
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage.txt

  lint:
    name: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'providers/anthropic', 'providers/bedrock', 'providers/google', 'providers/openai', 'memory/sqlite', 'memory/pgvector', 'memory/qdrant']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: --config=${{ github.workspace }}/.golangci.yml

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'providers/anthropic', 'providers/bedrock', 'providers/google', 'providers/openai', 'memory/sqlite', 'memory/pgvector', 'memory/qdrant']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (${{ matrix.module }})
        run: |
          cd "${{ matrix.module }}"
          govulncheck ./...

  gosec:
    name: gosec
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ['.', 'providers/anthropic', 'providers/bedrock', 'providers/google', 'providers/openai', 'memory/sqlite', 'memory/pgvector', 'memory/qdrant']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec (${{ matrix.module }})
        run: |
          cd "${{ matrix.module }}"
          gosec ./...
